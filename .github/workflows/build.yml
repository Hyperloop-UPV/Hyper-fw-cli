# .github/workflows/build.yml
name: Build binary with Debian Bullseye glibc

on:
  workflow_dispatch:   # manual trigger only

jobs:
  build:
    name: Build (Debian Bullseye)
    runs-on: ubuntu-latest
    container:
      image: debian:bullseye   # glibc 2.31, oldest supported Debian LTS
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            build-essential \
            gnupg
          # Add LLVM 14 official repository for Bullseye
          echo "deb http://apt.llvm.org/bullseye/ llvm-toolchain-bullseye-14 main" \
            > /etc/apt/sources.list.d/llvm.list
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -
          apt-get update
          apt-get install -y --no-install-recommends \
            llvm-14-dev \
            clang-14 \
            lld-14
          # Create symlinks so llvm-config-14 and clang-14 are directly in PATH
          ln -s /usr/bin/llvm-config-14 /usr/local/bin/llvm-config-14
          ln -s /usr/bin/clang-14 /usr/local/bin/clang
          # Odin also needs lld-link; ensure lld-14 is available
          ln -s /usr/bin/lld-14 /usr/local/bin/lld-link-14 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Odin compiler
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile project
        run: |
          export LLVM_CONFIG=/usr/bin/llvm-config-14
          odin build . -out:hyper -o:speed
        env:
          LLVM_CONFIG: /usr/bin/llvm-config-14

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyper-linux-glibc2.31
          path: hyper
